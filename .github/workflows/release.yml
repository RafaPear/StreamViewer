name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── macOS build ─────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install VLC (runtime dependency for python-vlc import)
        run: brew install --cask vlc

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build .app bundle
        run: |
          python -m PyInstaller StreamsClient.spec \
            --noconfirm --clean --distpath dist --workpath build

      - name: Package
        run: cd dist && zip -r StreamsClient-macOS.zip StreamsClient.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/StreamsClient-macOS.zip

  # ── Windows build ───────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install VLC (runtime dependency for python-vlc import)
        run: choco install vlc -y --no-progress

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build exe
        run: |
          python -m PyInstaller StreamsClient.spec `
            --noconfirm --clean --distpath dist --workpath build

      - name: Package
        run: Compress-Archive -Path dist\StreamsClient -DestinationPath dist\StreamsClient-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist\StreamsClient-Windows.zip

  # ── Create GitHub Release ───────────────────────────────────────────────────
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/macos-build/StreamsClient-macOS.zip
            artifacts/windows-build/StreamsClient-Windows.zip
